# Distributed Job Scheduler — full stack.
# One backend image runs in four modes (api / scheduler / reaper / worker),
# which maps 1:1 to the architecture diagram. Workers can be scaled freely:
#   docker compose up --scale worker=3
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scheduler}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scheduler_pw}
      POSTGRES_DB: ${POSTGRES_DB:-job_scheduler}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scheduler} -d ${POSTGRES_DB:-job_scheduler}"]
      interval: 3s
      timeout: 3s
      retries: 20

  # One-shot: applies SQL migrations, then exits. Everything else waits for it.
  migrate:
    build: ./backend
    command: ["npm", "run", "migrate"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://scheduler:scheduler_pw@postgres:5432/job_scheduler}
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: ./backend
    command: ["npm", "run", "api"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://scheduler:scheduler_pw@postgres:5432/job_scheduler}
      API_PORT: ${API_PORT:-4000}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      migrate:
        condition: service_completed_successfully

  scheduler:
    build: ./backend
    command: ["npm", "run", "scheduler"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://scheduler:scheduler_pw@postgres:5432/job_scheduler}
      SCHEDULER_INTERVAL_MS: ${SCHEDULER_INTERVAL_MS:-2000}
    depends_on:
      migrate:
        condition: service_completed_successfully

  reaper:
    build: ./backend
    command: ["npm", "run", "reaper"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://scheduler:scheduler_pw@postgres:5432/job_scheduler}
      REAPER_INTERVAL_MS: ${REAPER_INTERVAL_MS:-5000}
      HEARTBEAT_TIMEOUT_SECONDS: ${HEARTBEAT_TIMEOUT_SECONDS:-30}
    depends_on:
      migrate:
        condition: service_completed_successfully

  worker:
    build: ./backend
    command: ["npm", "run", "worker"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://scheduler:scheduler_pw@postgres:5432/job_scheduler}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-1000}
      LEASE_SECONDS: ${LEASE_SECONDS:-60}
      HEARTBEAT_INTERVAL_MS: ${HEARTBEAT_INTERVAL_MS:-5000}
    depends_on:
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    ports:
      - "${WEB_PORT:-5173}:80"
    depends_on:
      - api

volumes:
  pgdata:
